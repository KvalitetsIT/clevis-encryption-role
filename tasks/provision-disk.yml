---
# Provisions a single data disk: wipe → LUKS2 format → Clevis/Tang bind → verify.
#
# Called from tasks/main.yml inside the provisioning block, once per disk via
# include_tasks loop.  The loop variable is disk_device (bare name, e.g. nvme0n1).
#
# Expects on the remote host:
#   /tmp/ansible_luks_key  — written by the provisioning block before this file
#                            is included; removed by the block's always: handler.
#
# Expects in scope:
#   tang_sss_cfg  — JSON string assembled by the SSS configuration task in main.yml
#
# Idempotency: the cryptsetup isLuks guard skips all destructive steps when the
# device is already a LUKS volume, so re-running is safe.

- name: "Check whether already LUKS-formatted: {{ disk_device }}"
  ansible.builtin.command: cryptsetup isLuks "/dev/{{ disk_device }}"
  register: disk_is_luks
  changed_when: false
  failed_when: false

- name: "Check whether already bound to Clevis/Tang: {{ disk_device }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      clevis luks list -d "/dev/{{ disk_device }}" 2>/dev/null | grep -qE 'sss|tang'
    executable: /bin/bash
  register: disk_has_clevis
  changed_when: false
  failed_when: false
  when: disk_is_luks.rc == 0

# ── Destructive steps — only run on unencrypted devices ──────────────────────

- name: "Wipe existing filesystem signatures: {{ disk_device }}"
  ansible.builtin.command: wipefs -a "/dev/{{ disk_device }}"
  changed_when: true
  when: disk_is_luks.rc != 0

- name: "Format with LUKS2: {{ disk_device }}"
  ansible.builtin.command: >
    cryptsetup luksFormat --batch-mode
    --key-file /tmp/ansible_luks_key
    "/dev/{{ disk_device }}"
  changed_when: true
  when: disk_is_luks.rc != 0

- name: "Bind to Tang servers via SSS: {{ disk_device }}"
  ansible.builtin.shell:
    cmd: |
      clevis luks bind -d "/dev/{{ disk_device }}" -k /tmp/ansible_luks_key sss \
      '{{ tang_sss_cfg }}'
    executable: /bin/bash
  changed_when: true
  # Also re-bind if the device is LUKS but has no clevis token (e.g. partial
  # previous run that formatted but did not bind).
  when: disk_is_luks.rc != 0 or (disk_has_clevis is defined and disk_has_clevis.rc != 0)
  # clevis-encrypt-tang shells out to curl to fetch /adv; CURL_HOME points it at
  # the role's curlrc so the bind uses the same IP family the boot unlock will.
  environment:
    CURL_HOME: "{{ clevis_curl_home }}"

# ── Open, test Tang unlock, close ─────────────────────────────────────────────
# The mapper is named crypt-<LUKS-UUID> (persistent), NOT crypt-<device-node>:
# kernel node names are unstable across boots/controller flaps, whereas the LUKS
# header UUID is immutable and readable from the device itself. Read it now (the
# device is LUKS by this point — just formatted, or already was).

- name: "Read the LUKS header UUID: {{ disk_device }}"
  ansible.builtin.command: cryptsetup luksUUID "/dev/{{ disk_device }}"
  register: _luks_uuid
  changed_when: false
  check_mode: false

- name: "Open LUKS mapper with key file: {{ disk_device }}"
  ansible.builtin.command: >
    cryptsetup luksOpen --key-file /tmp/ansible_luks_key
    "/dev/{{ disk_device }}" "crypt-{{ _luks_uuid.stdout }}"
  args:
    creates: "/dev/mapper/crypt-{{ _luks_uuid.stdout }}"

- name: "Close LUKS mapper to test Tang network unlock: {{ disk_device }}"
  ansible.builtin.shell:
    cmd: |
      if [ -b "/dev/mapper/crypt-{{ _luks_uuid.stdout }}" ]; then
        cryptsetup luksClose "crypt-{{ _luks_uuid.stdout }}"
      fi
    executable: /bin/bash
  changed_when: false
  when: disk_is_luks.rc != 0

- name: "Verify Tang decryption succeeds (1-of-N SSS): {{ disk_device }}"
  # Deliberately omits --key-file to force the system to use the Clevis token.
  ansible.builtin.command: >
    clevis luks unlock -d "/dev/{{ disk_device }}" -n "crypt-{{ _luks_uuid.stdout }}"
  register: tang_verify
  until: tang_verify.rc == 0
  retries: 3
  delay: 5
  changed_when: tang_verify.rc == 0
  environment:
    PATH: "{{ ansible_facts.env.PATH }}:/usr/bin:/usr/local/bin"
    # clevis-decrypt-tang curls the recovery endpoint; pin the IP family.
    CURL_HOME: "{{ clevis_curl_home }}"
  when: disk_is_luks.rc != 0
