---
# Disk-SET systemd boot ordering for the encrypted ZFS pool.  Factored out of
# main.yml so replace-disk.yml can refresh it after the disk set changes.
#
# FAIL-DEGRADED design (see .ignored/encrypted-storage-boot-sync.md + the
# operator decision recorded there):
#   network-online
#     -> clevis-unlock-data.service        (retry Tang per disk; ALWAYS exit 0)
#     -> zfs-import-scan.service           (scan import, cachefile=none)
#     -> zfs-mount / zfs.target
#     -> encrypted-storage-pool-check.svc  (health ONLINE|DEGRADED -> ok)
#     -> encrypted-storage-ready.target    (the barrier the Proxmox daemons gate on)
#
# We intentionally do NOT gate the import on every dev-mapper-crypt\x2d*.device
# (that is the doc's FAIL-CLOSED variant — one missing disk fails the whole
# import).  Instead the unlock service decides per-disk (missing device vs Tang
# failure, with retries), the scan import takes whatever decrypted, and the
# pool-health check is the single viability gate: a degraded mirror still boots,
# an unimportable pool keeps the Proxmox daemons stopped.  Because the gate is
# the unlock SERVICE (not per-device units), no \x2d unit-name escaping is needed.
#
# Idempotent and safe on already-encrypted live systems.

# ── Remove the networking.service early bring-up drop-in ────────────────────
# An earlier attempt reordered networking.service (After= reset to bring the
# network up before sysinit completed) to speed up Tang reachability.  It was
# validated to BREAK boot — the network never comes online — so ensure it is
# absent on every host (including any that already received it).
- name: "Remove broken networking.service bring-up drop-in (validated to break boot)"
  ansible.builtin.file:
    path: /etc/systemd/system/networking.service.d/10-override.conf
    state: absent
  notify: "Reload systemd daemon"

# ── clevis-luks-askpass network gate (belt-and-suspenders) ──────────────────
- name: "Create systemd drop-in directory for clevis-luks-askpass"
  ansible.builtin.file:
    path: /etc/systemd/system/clevis-luks-askpass.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Wait for network-online before clevis-luks-askpass attempts Tang"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-luks-askpass.service.d/network-online.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      After=network-online.target
      Wants=network-online.target
  notify: "Reload systemd daemon"

# ── Retry-driven, fail-degraded unlock ──────────────────────────────────────
- name: "Deploy fail-degraded Clevis unlock script"
  ansible.builtin.template:
    src: clevis-unlock-data.sh.j2
    dest: /usr/local/sbin/clevis-unlock-data
    owner: root
    group: root
    mode: '0755'

- name: "Deploy clevis-unlock-data.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-unlock-data.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Unlock Clevis/Tang LUKS data disks (fail-degraded, with retries)
      Documentation=file:///usr/local/sbin/clevis-unlock-data
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/sbin/clevis-unlock-data
      # Bounded worst case: retries * (attempt_timeout + delay) per disk * disks,
      # plus a buffer, so systemd never kills the script mid-retry.
      TimeoutStartSec={{ (clevis_unlock_retries | int)
                         * (clevis_unlock_attempt_timeout | int + clevis_unlock_retry_delay | int)
                         * (clevis_raw_disks | length | int) + 120 }}

      [Install]
      WantedBy=zfs-import.target
  notify: "Reload systemd daemon"

# ── Scan-based import (stateless; replaces cache-based) ─────────────────────
- name: "Create zfs-import-scan.service drop-in directory"
  ansible.builtin.file:
    path: /etc/systemd/system/zfs-import-scan.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Gate scan import on the unlock attempt; import stateless (cachefile=none)"
  ansible.builtin.copy:
    dest: /etc/systemd/system/zfs-import-scan.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      # Wait for the (fail-degraded) unlock attempt to finish, then import
      # whatever decrypted.  Requires= on the unlock SERVICE (which always
      # succeeds), NOT on per-device units, so a degraded mirror still imports.
      Requires=clevis-unlock-data.service
      After=clevis-unlock-data.service

      [Service]
      ExecStart=
      ExecStart=/sbin/zpool import -aN -d /dev/mapper -o cachefile=none
  notify: "Reload systemd daemon"

# ── Pool-health viability gate (the real fail-closed point) ─────────────────
- name: "Deploy encrypted-storage pool-health check script"
  ansible.builtin.template:
    src: encrypted-storage-pool-check.sh.j2
    dest: /usr/local/sbin/encrypted-storage-pool-check
    owner: root
    group: root
    mode: '0755'

- name: "Deploy encrypted-storage-pool-check.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/encrypted-storage-pool-check.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Verify encrypted ZFS pool {{ clevis_pool_name }} imported and usable
      After=zfs-import-scan.service zfs-mount.service zfs.target
      Requires=zfs-import-scan.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      # ONLINE or DEGRADED -> usable (degraded mirror still serves I/O); absent /
      # FAULTED / UNAVAIL -> exit 1 so the barrier is NOT reached and the Proxmox
      # daemons stay stopped for manual recovery.
      ExecStart=/usr/local/sbin/encrypted-storage-pool-check
  notify: "Reload systemd daemon"

# ── The synchronization barrier ─────────────────────────────────────────────
- name: "Deploy encrypted-storage-ready.target (synchronization barrier)"
  ansible.builtin.copy:
    dest: /etc/systemd/system/encrypted-storage-ready.target
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Encrypted ZFS Storage Synchronization Barrier
      Documentation=man:systemd.special(7)
      # Reached only when the pool is imported and usable (full or degraded).
      Requires=encrypted-storage-pool-check.service
      After=encrypted-storage-pool-check.service
  notify: "Reload systemd daemon"

# ── Remove the obsolete cache-based / fail-closed drop-ins ──────────────────
# The old after-luks-unlock.conf carried ConditionPathExists for EVERY mapper
# (fail-closed) which would block a degraded import — must be removed.
- name: "Remove obsolete fail-closed / cache-based ZFS import drop-ins"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/zfs-import-cache.service.d/after-luks-unlock.conf
    - /etc/systemd/system/zfs-import-cache.service.d/override.conf
    - /etc/systemd/system/zfs-import-scan.service.d/after-luks-unlock.conf
    - /etc/systemd/system/zfs-import@.service.d/after-luks-unlock.conf
  notify: "Reload systemd daemon"

- name: "Switch ZFS import from cache-based to scan-based"
  ansible.builtin.systemd:
    name: "{{ item.unit }}"
    enabled: "{{ item.enabled }}"
  loop:
    - { unit: zfs-import-cache.service, enabled: false }
    - { unit: zfs-import-scan.service, enabled: true }
    - { unit: clevis-unlock-data.service, enabled: true }
  ignore_errors: "{{ ansible_check_mode }}"

- name: "Enable clevis-luks-askpass.path for late-boot unlock"
  ansible.builtin.systemd:
    name: clevis-luks-askpass.path
    enabled: true
    state: started
  ignore_errors: "{{ ansible_check_mode }}"

- name: "Flush handlers (daemon_reload) before continuing"
  ansible.builtin.meta: flush_handlers
