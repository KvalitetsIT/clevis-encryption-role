---
# Entry point for the clevis-encryption role.
#
# Orchestrates the full lifecycle in three phases:
#
#   PRESTAGE  (tag: prestage; idempotent and safe on un-encrypted nodes)
#     Installs encryption packages, applies Tang network preconditions
#     (DNS, plus the clevis curl IP-family pin written to a curlrc).
#     Run on its own with --tags prestage to do this work ahead of the
#     actual encryption window.
#
#   BLOCK: provisioning  (when: recovery key does not yet exist on controller)
#     Generates a DR passphrase, fetches Tang advertisements, and formats +
#     binds all data disks with LUKS2/Clevis.  The temporary key is always
#     removed from the remote host via the block's always: handler, even on failure.
#
#   BLOCK: boot ordering  (tag: systemd; always runs, idempotent)
#     Writes /etc/crypttab entries and systemd drop-ins that ensure the
#     correct unlock → pool-import sequence on every boot.  Safe to run
#     against already-encrypted nodes.
#
# Key variables (all have defaults in defaults/main.yml except tang_servers):
#   clevis_encryption_enabled  — set false to skip the entire role
#   tang_servers               — must be set in group_vars / host_vars
#   clevis_vault_password_file — vault password file on the controller
#   clevis_keep_temp_key       — retain /tmp/ansible_luks_key (debug only)

- name: "Skip: clevis_encryption_enabled is false"
  ansible.builtin.debug:
    msg: "clevis-encryption role skipped on {{ inventory_hostname }}"
  when: not (clevis_encryption_enabled | default(true) | bool)

- name: "Run clevis-encryption role"
  when: clevis_encryption_enabled | default(true) | bool
  block:

    # ── LEGACY CLEANUP ──────────────────────────────────────────────────────
    # Remove artifacts that previous versions of this role deployed and the
    # current design no longer uses.  tags: always so it runs under any tag
    # filter (full run, --tags prestage|provision|systemd) and on hosts last
    # touched by any old version.  Ordered FIRST so the IPv6 live-reset happens
    # before the network-prereq IP-family probe (which may need IPv6 up).
    - name: "Clean up artifacts from previous role versions"
      ansible.builtin.include_tasks: cleanup-legacy.yml
      tags: always

    # ── PRESTAGE ────────────────────────────────────────────────────────────
    # Pre-stageable tasks: package install + Tang network preconditions.
    # Tagged 'prestage' so the operator can run this work ahead of time on
    # nodes that haven't yet had disk encryption provisioned, shortening the
    # maintenance window for the destructive LUKS-format step.
    # Also runs as part of a full (no-tag) invocation so first-run behaviour
    # is unchanged.

    - name: "Prestage: packages + Tang network preconditions"
      ansible.builtin.include_tasks: prestage.yml
      tags: [prestage]

    # ── PRE-FLIGHT ──────────────────────────────────────────────────────────
    # These tasks always run.  They establish the facts needed by both the
    # provisioning and boot-ordering blocks.

    - name: "Check whether recovery key already exists on controller"
      ansible.builtin.stat:
        path: "{{ clevis_recovery_key_path }}"
      register: clevis_recovery_key_stat
      delegate_to: localhost
      become: false
      check_mode: false

    # Auto-discovery is a LOCAL-DISK CONVENIENCE only, and is isolated in
    # discover-disks.yml so it is easy to deprecate/relocate (choosing which
    # devices to encrypt is a storage-topology/inventory concern — see that file
    # and docs/luks-uuid-naming-migration.md).
    #   when: not defined — an explicit, inventory-declared clevis_raw_disks is
    #     always preferred (and required for multipath/SAN); discovery only fills
    #     the gap when the caller supplied nothing. Molecule/test harnesses that
    #     pre-set clevis_raw_disks therefore skip discovery entirely.
    #   tags: always — the disk list is consumed by both the provisioning and
    #     systemd blocks; without it the --tags systemd path has no disk list.
    - name: "Discover raw physical data disks (largest size group)"
      ansible.builtin.include_tasks: discover-disks.yml
      when: clevis_raw_disks is not defined
      tags: always

    # ── BLOCK: PROVISIONING ─────────────────────────────────────────────────
    # Skipped entirely when the recovery key vault file already exists on the
    # controller — that file is created at the end of a successful first run,
    # so its presence means the node was already provisioned.
    #
    # The always: section guarantees the temporary key is removed from the
    # remote host even if any provisioning task fails midway.

    - name: "Provision disk encryption"
      when: not clevis_recovery_key_stat.stat.exists
      tags: [provision]
      block:

        # --- Recovery key -------------------------------------------------------
        # Generates the DR passphrase (sets clevis_passphrase) and stores it as
        # the vault-encrypted recovery key on the controller.
        - name: "Generate and vault the DR recovery key"
          ansible.builtin.include_tasks: generate-recovery-key.yml

        # Network preconditions for Tang (DNS + the clevis curl IP-family pin)
        # are handled by tasks/prestage.yml above — runs unconditionally on every
        # full-role invocation, so by the time we reach this point the host is
        # already configured to talk to the Tang servers correctly.

        # --- Tang advertisement fetch and SSS assembly ------------------------
        - name: "Fetch Tang advertisements and assemble SSS config"
          ansible.builtin.include_tasks: tang-adv.yml

        # --- Disk provisioning ------------------------------------------------
        - name: "Write temporary key file to remote host"
          ansible.builtin.copy:
            dest: /tmp/ansible_luks_key
            content: "{{ clevis_passphrase }}"
            owner: root
            group: root
            mode: '0600'

        - name: "Provision encryption on each data disk"
          ansible.builtin.include_tasks: provision-disk.yml
          loop: "{{ clevis_raw_disks }}"
          loop_control:
            loop_var: disk_device
            label: "{{ disk_device }}"

        # NOTE: this role is NBDE-only. Storage pool creation/import lives in a
        # separate consumer role (e.g. proxmox_encrypted_storage) that orders on
        # the clevis-luks-unlocked.target this role publishes.

      always:
        - name: "Remove temporary key from remote host"
          ansible.builtin.file:
            path: /tmp/ansible_luks_key
            state: absent
          when: not (clevis_keep_temp_key | default(false) | bool)

    # ── BLOCK: BOOT ORDERING ────────────────────────────────────────────────
    # Always runs — idempotent and safe on already-encrypted live systems.
    #
    # Applies the crypttab entries and systemd drop-ins that unlock the disks at
    # boot and publish clevis-luks-unlocked.target for a downstream storage
    # consumer to order after.
    #
    # Can be run in isolation against an already-encrypted node:
    #   ansible-playbook ... --tags systemd

    - name: "Apply boot ordering configuration"
      tags: [systemd]
      block:

        # The clevis curl IP-family pin (curlrc under clevis_curl_home) is
        # handled by tasks/prestage.yml.  It is NOT re-run from this block;
        # operators using --tags systemd to re-apply boot ordering on an already-
        # provisioned node should combine with prestage if they also want the
        # IP-family pin re-evaluated:  --tags prestage,systemd

        # Pre-flight guard: collect the (target, uuid) set from live blkid and
        # fail the play on a duplicate/unresolved LUKS UUID BEFORE any crypttab
        # line is written — the crypttab UUID-collision bug that leaves a mirror
        # member UNAVAIL every boot.
        - name: "Validate the crypttab UUID set before writing it"
          ansible.builtin.include_tasks: validate-crypttab.yml

        - name: "Configure crypttab and live discard for each data disk"
          ansible.builtin.include_tasks: configure-disk.yml
          loop: "{{ clevis_raw_disks }}"
          loop_control:
            loop_var: disk_device
            label: "{{ disk_device }}"

        # Systemd drop-ins: the clevis-luks-askpass network gate, the
        # clevis-unlock-data service, and the public clevis-luks-unlocked.target
        # seam. Factored out so replace-disk.yml can refresh them after the disk
        # set changes (the unlock service's timeout scales with the disk count).
        - name: "Write disk-set systemd boot-ordering drop-ins"
          ansible.builtin.include_tasks: boot-ordering-dropins.yml

        # Post-deploy verification: install the fleet-wide audit tool and run it
        # against the freshly written /etc/crypttab, cross-referencing live
        # devices (and any open mapper's true backing device). Fails on a hard
        # finding (duplicate / orphan / crossed mapper).
        - name: "Verify crypttab has no UUID collisions"
          ansible.builtin.include_tasks: verify-crypttab.yml
