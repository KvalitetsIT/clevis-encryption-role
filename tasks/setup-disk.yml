---
# ── Idempotency guard ─────────────────────────────────────────────────────────
# All destructive steps (wipe, format, bind) are skipped when the device is
# already a LUKS volume.  Re-running the playbook on a live encrypted node is
# therefore safe: it will only apply the systemd ordering drop-ins.
- name: "Check if {{ disk_device }} is already LUKS-formatted"
  ansible.builtin.command: cryptsetup isLuks "/dev/{{ disk_device }}"
  register: disk_is_luks
  changed_when: false
  failed_when: false

- name: "Check if {{ disk_device }} already has a Clevis binding"
  ansible.builtin.shell: clevis luks list -d "/dev/{{ disk_device }}" 2>/dev/null | grep -qE 'sss|tang'
  register: disk_has_clevis
  changed_when: false
  failed_when: false
  when: disk_is_luks.rc == 0

# ── Provisioning (skipped when disk is already encrypted) ─────────────────────
- name: "Wipe filesystem signatures from {{ disk_device }}"
  ansible.builtin.command: wipefs -a "/dev/{{ disk_device }}"
  changed_when: true
  when: disk_is_luks.rc != 0

- name: "Format {{ disk_device }} with LUKS2"
  ansible.builtin.command: cryptsetup luksFormat --batch-mode --key-file {{ ansible_luks_key_path }}  "/dev/{{ disk_device }}"
  when: disk_is_luks.rc != 0

- name: "Bind {{ disk_device }} to Tang"
  ansible.builtin.shell: |
    clevis luks bind -d "/dev/{{ disk_device }}" -k "{{ ansible_luks_key_path }}" sss \
    '{{ tang_sss_cfg }}'
  args:
    executable: /bin/bash
  when: disk_is_luks.rc != 0 or (disk_has_clevis is defined and disk_has_clevis.rc != 0)

- name: "Open {{ disk_device }}"
  ansible.builtin.command: cryptsetup luksOpen --key-file {{ ansible_luks_key_path }} "/dev/{{ disk_device }}" "crypt-{{ disk_device }}"
  args:
    creates: "/dev/mapper/crypt-{{ disk_device }}"

- name: "Close device to test network unlocking"
  ansible.builtin.shell: |
    if [ -b "/dev/mapper/crypt-{{ disk_device }}" ]; then
      cryptsetup luksClose "crypt-{{ disk_device }}"
    fi
  changed_when: false
  when: disk_is_luks.rc != 0

- name: "Verify Tang decryption (1-of-N)"
  # We attempt to open WITHOUT the key-file.
  # This forces the system to use the Clevis token in the LUKS header.
  ansible.builtin.shell: |
    #cryptsetup luksOpen --batch-mode "/dev/{{ disk_device }}" "crypt-{{ disk_device }}"
    clevis luks unlock -d "/dev/{{ disk_device }}" -n "crypt-{{ disk_device }}"
  register: tang_verify
  until: tang_verify.rc == 0
  retries: 3
  delay: 5
  environment:
    # Ensuring the path includes clevis binaries
    PATH: "{{ ansible_env.PATH }}:/usr/bin:/usr/local/bin"
  when: disk_is_luks.rc != 0

- name: "Confirm device is open and accessible"
  ansible.builtin.stat:
    path: "/dev/mapper/crypt-{{ disk_device }}"
  register: crypt_status
  failed_when: not crypt_status.stat.exists and not ansible_check_mode


- name: "Get UUID of {{ disk_device }}"
  ansible.builtin.command: blkid -s UUID -o value "/dev/{{ disk_device }}"
  register: disk_uuid
  changed_when: false

- name: "Add {{ disk_device }} to /etc/crypttab"
  ansible.builtin.lineinfile:
    path: /etc/crypttab
    # _netdev       - tells systemd this device needs network; adds the unit to
    #                 remote-cryptsetup.target and sets After=network.target.
    # x-systemd.after=network-online.target
    #               - strengthens the ordering to full routed connectivity, which
    #                 is required for the HTTPS tang unlock to succeed.
    #                 (Replaces the old `noauto` flag: `noauto` was removing the
    #                 unit from remote-cryptsetup.target entirely, which stripped
    #                 ALL network ordering and caused 600+ failed tang attempts
    #                 before the link was up.)
    # nofail        - boot continues even if unlock times out (e.g. tang offline).
    line: "crypt-{{ disk_device }} UUID={{ disk_uuid.stdout }} none luks,discard,nofail,_netdev,x-systemd.after=network-online.target"
    create: true
    mode: '0600'
    owner: root
    group: root

# ── Fix 2: clevis-luks-askpass network gate ───────────────────────────────────
# Belt-and-suspenders: even if the crypt unit ordering were somehow bypassed,
# the clevis service itself will not attempt tang until the network is online.
- name: "Create systemd drop-in directory for clevis-luks-askpass"
  ansible.builtin.file:
    path: /etc/systemd/system/clevis-luks-askpass.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Ensure clevis-luks-askpass waits for network-online before attempting tang"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-luks-askpass.service.d/network-online.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      After=network-online.target
      Wants=network-online.target

# ── Fix 3: ZFS import ordering after LUKS unlock ──────────────────────────────
# Without noauto, the crypt units are now members of remote-cryptsetup.target.
# remote-cryptsetup.target is reached only after every crypt unit either
# unlocks successfully or times out (nofail).  Telling zfs-import-cache to run
# After=remote-cryptsetup.target means it now sees the mapper devices.
#
# The deprecated systemd-udev-settle dependency (logged as a warning by ZFS
# at every boot) is also removed here; udev completion is already guaranteed
# by the device unit dependencies ZFS creates.
- name: "Create systemd drop-in directory for zfs-import-cache"
  ansible.builtin.file:
    path: /etc/systemd/system/zfs-import-cache.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Fix ZFS import ordering: run after LUKS/Clevis unlock is complete"
  ansible.builtin.copy:
    dest: /etc/systemd/system/zfs-import-cache.service.d/after-luks-unlock.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      # Wait for all remote-encrypted volumes (crypt-nvme* units) to either
      # unlock or time out before attempting pool import.  Without this,
      # zfs-import-cache runs while the mapper devices are still absent and
      # the pool import fails silently.
      After=remote-cryptsetup.target

- name: "Reload systemd daemon to pick up drop-in overrides"
  ansible.builtin.systemd:
    daemon_reload: true
